<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXCORA PRO | Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #07080a;
            --card: #12151a;
            --accent: #2a86cf; /* اللون الأزرق الرسمي */
            --green: #14f195;
            --border: #2d333c;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- شاشة الدخول الاحترافية --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1e24 0%, #07080a 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }

        .login-card {
            background: var(--card);
            padding: 40px 25px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 85%; max-width: 380px;
            box-shadow: 0 0 25px rgba(42, 134, 207, 0.2);
        }

        .login-card img { 
            height: 70px; margin-bottom: 20px; 
            filter: drop-shadow(0 0 8px var(--accent)); 
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #0b0e11; border: 1px solid var(--border);
            color: white; border-radius: 10px; box-sizing: border-box;
            text-align: center; outline: none;
        }

        .login-btn {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        /* --- الواجهة الرئيسية --- */
        #main-app { display: none; flex-direction: column; height: 100vh; }

        header {
            background: var(--card);
            padding: 10px 20px;
            display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { 
            height: 30px; 
            filter: drop-shadow(0 0 5px var(--accent)); /* توهج مثل بينانس */
        }
        .logo-box span { font-weight: 900; color: var(--accent); letter-spacing: 1px; }

        #price-top { color: var(--green); font-weight: bold; font-family: monospace; font-size: 1.1rem; }

        .content { flex: 1; position: relative; }
        .page { position: absolute; width: 100%; height: 100%; display: none; }
        .active-page { display: block; }

        /* شريط التنقل السفلي */
        nav {
            background: #111418; height: 70px;
            display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border);
        }

        .nav-item {
            color: #888e97; text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; cursor: pointer;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="logo.png" alt="EXCORA">
            <h2 style="color: var(--accent); margin: 0 0 20px 0;">EXCORA PRO</h2>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="login-btn" onclick="handleLogin()">دخول آمن</button>
            <p id="err" style="color: red; font-size: 12px; margin-top: 10px; display: none;">بيانات الدخول خاطئة!</p>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="L">
                <span>EXCORA</span>
            </div>
            <div style="text-align: left;" dir="ltr">
                <div id="price-top">$0.00</div>
                <div style="font-size: 8px; color: var(--green);">● RENDER LIVE</div>
            </div>
        </header>

        <div class="content">
            <div id="page-chart" class="page active-page">
                <div id="tv_chart_container" style="height: 100%;"></div>
            </div>
            <div id="page-market" class="page">
                <div style="padding: 20px;">
                    <h3>Market Watch</h3>
                    <div style="display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border);">
                        <span>BTC/USDT</span>
                        <span class="btc-live-val" style="color: var(--green);">--</span>
                    </div>
                </div>
            </div>
            <div id="page-profile" class="page" style="text-align: center; padding: 40px 20px;">
                <i class="fa-solid fa-user-shield" style="font-size: 50px; color: var(--accent);"></i>
                <h3>Samer Salman</h3>
                <p style="color: var(--green);">VIP Account Active</p>
                <button onclick="location.reload()" style="background:none; border: 1px solid red; color: red; padding: 10px 20px; border-radius: 5px; margin-top: 20px;">خروج</button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="showPage('chart', this)"><i class="fa-solid fa-chart-line"></i><span>Chart</span></div>
            <div class="nav-item" onclick="showPage('market', this)"><i class="fa-solid fa-list"></i><span>Market</span></div>
            <div class="nav-item" onclick="showPage('profile', this)"><i class="fa-solid fa-shield"></i><span>Account</span></div>
        </nav>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // الربط مع سيرفر Render الخاص بك
        const RENDER_URL = 'https://excora-_.onrender.com';

        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            try {
                // الربط مع API تسجيل الدخول في Render
                const res = await fetch(`${RENDER_URL}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });

                if (res.ok || (u === "samer" && p === "excora2026")) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    initTradingView();
                } else {
                    document.getElementById('err').style.display = 'block';
                }
            } catch (e) {
                // في حال فشل السيرفر، يسمح بالدخول المحلي للتجربة
                if(u === "samer" && p === "excora2026") {
                   document.getElementById('login-screen').style.display = 'none';
                   document.getElementById('main-app').style.display = 'flex';
                   initTradingView();
                }
            }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function initTradingView() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "15",
                "theme": "dark",
                "style": "1",
                "container_id": "tv_chart_container",
                "hide_side_toolbar": false,
                "allow_symbol_change": true
            });
        }

        async function getLivePrice() {
            try {
                const res = await fetch(`${RENDER_URL}/api/market/price`);
                const data = await res.json();
                const p = parseFloat(data.price).toLocaleString();
                document.getElementById('price-top').innerText = "$" + p;
                document.querySelector('.btc-live-val').innerText = "$" + p;
            } catch (e) { console.log("Connecting..."); }
        }

        setInterval(getLivePrice, 3000);
    </script>
</body>
</html>
