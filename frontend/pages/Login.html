<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCORA PRO - تسجيل الدخول</title>
    <style>
        body {
            background-color: #0b0e11;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            text-align: center;
            background: #1e2329;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
        }
        /* تعديل رابط الشعار ليعمل مع Render */
        .logo {
            width: 150px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #474d57;
            background: #2b3139;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00FFA3; /* لون Solana الأخضر */
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://excora.onrender.com/static/logo.png" alt="EXCORA Logo" class="logo">
    
    <h2>تسجيل الدخول</h2>
    <input type="text" placeholder="اسم المستخدم">
    <input type="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<script>
    async function login() {
        // الربط البرمجي مع API الخاص بك على Render
        const response = await fetch('https://excora.onrender.com/');
        const data = await response.json();
        alert("حالة المحرك: " + data.status);
    }
</script>

</body>
</html>
