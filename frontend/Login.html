<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Login | EXCORA PRO</title>
    <style>
        body { background-color:#0b0e11; color:white; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card { background:#1e2329; padding:40px; border-radius:20px; width:300px; text-align:center; border:1px solid #333; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #444; background:#2b3139; color:white; box-sizing:border-box; }
        button { background:#0263FF; color:white; border:none; padding:14px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/logo.png" width="70" style="margin-bottom:20px">
        <h2>تسجيل الدخول</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول</button>
        </form>
    </div>
</body>
</html>
