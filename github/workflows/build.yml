name: EXCORA PRO APK BUILD
on:
  push:
    branches: [ master, main ] # سيعمل عند الرفع على أي من الفرعين

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Ionic & Capacitor
        run: npm install -g @ionic/cli @capacitor/cli

      - name: Install Project Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build || mkdir www # إنشاء مجلد وهمي إذا لم يوجد سكربت بناء

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v3
        with:
          name: EXCORA-PRO-DEBUG
          path: android/app/build/outputs/apk/debug/app-debug.apk
